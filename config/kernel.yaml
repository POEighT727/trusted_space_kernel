# 可信数据空间内核配置

kernel:
  # 内核ID，全局唯一
  id: "kernel-1"
  # 内核类型：primary, secondary
  type: "primary"
  # 内核描述
  description: "Primary Trusted Space Kernel"

server:
  # 监听地址
  # "0.0.0.0" - 监听所有网络接口，允许跨主机连接（推荐用于跨主机部署）
  # "127.0.0.1" 或 "localhost" - 仅监听本地回环接口，仅允许本地连接
  address: "192.168.31.155"
  port: 50051

# 多内核配置（内核默认启用多内核模式）
multi_kernel:
  # 种子内核列表（用于初始发现其他内核）
  # seed_kernels: 
  #   - kernel_id: "kernel-2"
  #     address: "192.168.202.128"
  #     port: 50053
  # 内核间通信端口（默认为主端口+2，避免与bootstrap端口冲突）
  kernel_port: 50053
  # 心跳间隔（秒）
  heartbeat_interval: 30
  # 连接超时（秒）
  connect_timeout: 10
  # 最大重试次数
  max_retries: 3

security:
  ca_cert_path: "certs/ca.crt"
  ca_key_path: "certs/ca.key"
  server_cert_path: "certs/kernel.crt"
  server_key_path: "certs/kernel.key"
  # 内核间通信证书
  kernel_cert_path: "certs/kernel.crt"
  kernel_key_path: "certs/kernel.key"

evidence:
  persistent: true
  log_file_path: "logs/audit.log"

database:
  enabled: true       # 是否启用数据库
  host: "localhost"
  port: 3306
  user: "root"
  password: "123456"
  database: "trusted_space"

channel:
  evidence:
    # 默认存证方式：none, internal, external, hybrid
    default_mode: "none"
    # 默认存证策略：all, data, control, important
    default_strategy: "all"
    # 默认外部存证连接器ID（当mode为external或hybrid时使用）
    default_connector_id: ""
    # 默认启用备份存证
    default_backup_enabled: false
    # 默认存证数据保留天数
    default_retention_days: 30
    # 默认压缩存证数据
    default_compress_data: true

# 临时通信配置（运维方功能）
tempchat:
  # 是否启用临时通信功能
  enabled: true
  # 临时通信服务监听端口（独立于主服务端口）
  port: 50055
  # 会话超时时间（秒）- 连接器多久不心跳则视为离线
  session_timeout: 60
  # 心跳间隔（秒）- 连接器发送心跳的频率
  heartbeat_interval: 15
  # 运维方同步间隔（秒）- 与其他运维方同步在线连接器列表的频率
  sync_interval: 30

# P2P运维方直连配置
# 运维方之间直接建立TCP连接：
# 1. 直接同步在线连接器列表
# 2. 直接转发连接器间的临时消息
# 连接采用"按需建立"模式，无需配置 peers 列表
p2p:
  # 是否启用P2P直连功能
  enabled: true
  # P2P服务监听地址（默认: kernel_port+3）
  # listen_addr: "0.0.0.0:50054"

# Bootstrap 一次性注册码配置
# 用于无证书首次注册时验证连接器身份
bootstrap:
  # 是否启用 Bootstrap Token 验证（默认: true）
  enabled: true
  # 默认 Token 有效期（如不设置，默认 168h = 7天）
  default_expiry: "168h"
  # Token 配置文件路径（单独存储，便于管理）
  token_config_file: "config/bootstrap_tokens.yaml"
  # 内联 Token 列表（可选，方便测试）
  tokens: []
